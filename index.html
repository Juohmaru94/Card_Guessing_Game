<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Guessing Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background"></div>
  <main class="game-shell">
    <header class="top-bar">
      <div>
        <h1>Card Guessing Game</h1>
        <p class="subtitle">Survive all 52 cards by never guessing the exact card value.</p>
      </div>
      <div class="top-bar-actions">
        <button id="settings-toggle" class="btn icon-btn" type="button" aria-label="Open settings">&#9881;</button>
        <div class="audio-controls">
          <button id="sfx-toggle" class="btn mute-btn" type="button" aria-pressed="false" aria-label="Toggle Sound FX">Sound FX: On</button>
          <button id="music-toggle" class="btn mute-btn" type="button" aria-pressed="false" aria-label="Toggle Music">Music: On</button>
        </div>
      </div>
    </header>

    <section class="status-panel">
      <div class="stat">
        <span class="label">Cards Remaining</span>
        <span id="remaining" class="value">52</span>
      </div>
      <div class="stat">
        <span class="label">Round</span>
        <span id="round" class="value">1 / 52</span>
      </div>
      <div class="stat">
        <span class="label">Result</span>
        <span id="result" class="value neutral">Make your guess</span>
      </div>
    </section>

    <section class="table-area">
      <div id="card" class="card face-down" aria-live="polite">
        <div class="card-face front">
          <span id="card-rank">?</span>
          <span class="card-suit top-left" data-card-suit>&spades;</span>
          <span class="card-suit top-right" data-card-suit>&spades;</span>
          <span class="card-suit bottom-left" data-card-suit>&spades;</span>
          <span class="card-suit bottom-right" data-card-suit>&spades;</span>
        </div>

        <div class="card-face back" aria-hidden="true"></div>

      </div>
      <div id="shuffle-layer" class="shuffle-layer" aria-hidden="true"></div>
      <p id="card-text" class="card-text">Click New Game to shuffle</p>
    </section>

    <section>
      <h2>Pick a value</h2>
      <div id="guess-grid" class="guess-grid" role="group" aria-label="Card value choices"></div>
    </section>

    <div class="controls">
      <button id="restart" class="btn new-game-btn">New Game</button>
    </div>
  </main>

  <div id="settings-overlay" class="settings-overlay" hidden>
    <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button id="settings-close" class="btn icon-btn" type="button" aria-label="Close settings">&#10005;</button>
      </div>
      <div class="settings-content">
        <section class="settings-section">
          <button
            id="mode-toggle"
            class="settings-section-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="mode-panel"
          >
            <span>Mode</span>
            <span class="settings-section-chevron" aria-hidden="true">&#9662;</span>
          </button>
          <div id="mode-panel" class="settings-section-panel" hidden>
            <div id="mode-options" class="mode-options" role="radiogroup" aria-label="Game mode">
              <button id="mode-classic" class="mode-option selected" type="button" role="radio" aria-checked="true" data-mode="classic">Classic</button>
              <button id="mode-streak" class="mode-option" type="button" role="radio" aria-checked="false" data-mode="streak">Streak</button>
            </div>
          </div>
        </section>

        <section class="settings-section">
          <button
            id="card-design-toggle"
            class="settings-section-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="card-design-panel"
          >
            <span>Card Design</span>
            <span class="settings-section-chevron" aria-hidden="true">&#9662;</span>
          </button>
          <div id="card-design-panel" class="settings-section-panel" hidden>
            <div id="card-design-options" class="card-design-options" role="radiogroup" aria-label="Card design"></div>
          </div>
        </section>

        <section class="settings-section">
          <button
            id="volume-toggle"
            class="settings-section-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="volume-panel"
          >
            <span>Volume</span>
            <span class="settings-section-chevron" aria-hidden="true">&#9662;</span>
          </button>
          <div id="volume-panel" class="settings-section-panel" hidden>
            <div class="volume-controls">
              <label class="volume-control" for="music-volume">
                <span>Game Music</span>
                <span id="music-volume-value">100%</span>
              </label>
              <input id="music-volume" class="metal-slider" type="range" min="0" max="100" step="1" value="100" aria-label="Game music volume">

              <label class="volume-control" for="sfx-volume">
                <span>Sound FX</span>
                <span id="sfx-volume-value">100%</span>
              </label>
              <input id="sfx-volume" class="metal-slider" type="range" min="0" max="100" step="1" value="100" aria-label="Sound FX volume">
            </div>
          </div>
        </section>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
